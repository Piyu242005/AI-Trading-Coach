version: "3.8"
services:
  nevup-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - JWT_SECRET=nevup-hackathon-secret
      - JWT_ALGORITHM=HS256
    depends_on:
      - mongo
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: